# Stack local/standalone: backend + Redis + Postgres. Sem segredo (API pública).
services:
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes: [redis-data:/data]
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 10s, timeout: 3s, retries: 5 }
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-sppotracker}
      POSTGRES_USER: ${DB_USER:-sppotracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sppotracker}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U ${DB_USER:-sppotracker}"], interval: 10s, timeout: 3s, retries: 5 }
    restart: unless-stopped

  sppo-tracker-backend:
    build: { context: ., dockerfile: Dockerfile }
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    ports: ["${SERVER_PORT:-8090}:8080"]
    environment:
      REDIS_HOST: redis
      DB_HOST: postgres
      GPS_POLLING_ENABLED: ${GPS_POLLING_ENABLED:-true}
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
